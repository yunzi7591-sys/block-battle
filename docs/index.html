<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Battle - パズル対戦ゲーム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            background: linear-gradient(135deg, #e94560, #533483);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(233, 69, 96, 0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 1.2em;
            color: #a0a0b0;
            margin-bottom: 32px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .feature-icon { font-size: 1.8em; margin-bottom: 8px; }
        .feature h3 { font-size: 1em; margin-bottom: 4px; }
        .feature p { font-size: 0.85em; color: #a0a0b0; }
        .links {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .links a:hover { color: #fff; }
        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">VS</div>
        <h1>Block Battle</h1>
        <p class="tagline">ブロックパズル × リアルタイム対戦</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🧩</div>
                <h3>パズルモード</h3>
                <p>一人でじっくり高スコアを目指そう</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⚔️</div>
                <h3>オンライン対戦</h3>
                <p>世界中のプレイヤーとリアルタイムバトル</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <h3>AI対戦</h3>
                <p>3段階のAIと腕試し</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🏆</div>
                <h3>ランキング</h3>
                <p>スコアを競い合おう</p>
            </div>
        </div>

        <div class="links">
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="terms.html">利用規約</a>
        </div>
    </div>
</body>
</html>
